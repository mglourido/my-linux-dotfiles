include base.conf

# Minimal Tab bar styling
tab_bar_edge                bottom
tab_bar_style               powerline
tab_powerline_style         slanted
tab_activity_symbol         "● "
tab_title_template          {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}

# Edición de línea en Zsh. Kitty debe enviar una secuencia diferenciada para
# que Ctrl+Enter no sea indistinguible de Enter en el protocolo tradicional.
map ctrl+enter               send_text all \e[13;5u
map alt+enter                send_text all \e\r
map ctrl+shift+z             send_text all \e[122;6u

# Nuevas ventanas conservan el directorio actual gracias a shell integration.
map ctrl+shift+enter         new_window_with_cwd
map ctrl+shift+t             new_tab_with_cwd
map ctrl+shift+n             new_os_window_with_cwd

# Navegación y consulta de salida. Ctrl+Shift+Z queda reservado para redo de
# Zsh, por eso los saltos entre prompts usan Ctrl+Alt+Z/X.
map ctrl+alt+z               scroll_to_prompt -1
map ctrl+alt+x               scroll_to_prompt 1
map ctrl+shift+g             show_last_command_output
map ctrl+shift+h             show_scrollback
map ctrl+shift+e             open_url_with_hints
map ctrl+alt+l               clear_terminal last_command active

# Selección específica de cada máquina. GiGiOS/bin/kitty-profile.sh crea este
# symlink; globinclude permite que Kitty arranque con la base incluso antes de
# que una instalación nueva haya elegido el perfil.
globinclude active-profile.conf
