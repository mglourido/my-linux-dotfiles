# Perfil de bajo consumo. Conserva los valores de la configuración original
# del portátil y limita la frecuencia de repintado y el historial en memoria.
repaint_delay               16
input_delay                 5
sync_to_monitor             yes
cursor_trail                1
cursor_blink_interval       0
scrollback_lines            2000
scrollback_pager_history_size 0
