# Perfil responsivo para el sobremesa. Reduce las esperas internas y conserva
# la animación del cursor; se mantiene la sincronización para evitar tearing.
repaint_delay               2
input_delay                 0
sync_to_monitor             yes
cursor_trail                1
cursor_blink_interval       0
scrollback_lines            2000
scrollback_pager_history_size 5
