# This is the configuration file for kitty terminal
# For more information, see https://sw.kovidgoyal.net/kitty/conf.html
# For your custom configurations, put it in ./kitty.conf
font_family CaskaydiaCove Nerd Font Mono
bold_font auto
italic_font auto
bold_italic_font auto
enable_audio_bell no
font_size 9.0
window_padding_width 25

# Integración y ergonomía. El control remoto sigue desactivado para que ningún
# proceso local o remoto pueda leer/escribir otras ventanas de Kitty.
shell_integration enabled
allow_remote_control no
notify_on_cmd_finish invisible 15.0
strip_trailing_spaces smart
scrollback_fill_enlarged_window yes

# Themes can override any settings in this file
include theme.conf
#background_opacity 0.60
#hide_window_decorations yes
#confirm_os_window_close 0
