# ── Render ───────────────────────────────────────────────
# Disabled: Hyprland's built-in colour management applies a hardware CTM that
# conflicts with hyprsunset (which also writes the KMS CTM for night light).
# With both active the image looks washed out. hyprsunset manages the CTM alone.
render {
    cm_enabled = false
}

# ── Sources ─────────────────────────────────────────────
source = ~/.config/hypr/env.conf
source = ~/.config/hypr/variables.conf
source = ~/.config/hypr/monitors.conf
# Resolución/Hz/escala por monitor, generadas desde AGS · Ajustes > Pantalla. Van
# después de monitors.conf, cuya regla comodín (preferred/escala 1) es solo el
# fallback para monitores sin preferencia guardada. Sin esto, un `hyprctl reload`
# devolvía la pantalla a modo preferido y escala 1.
source = ~/.config/hypr/monitor-settings.conf
source = ~/.config/hypr/input.conf
source = ~/.config/hypr/windows.conf
source = ~/.config/hypr/animations.conf
source = ~/.config/hypr/rules.conf
source = ~/.config/hypr/keybinds.conf
source = ~/.config/hypr/autostart.conf
source = ~/.config/hypr/permissions.conf

# ── GPU ──────────────────────────────────────────────────
# Descomenta SOLO el archivo de la máquina en la que estás:
# source = ~/.config/hypr/gpu/laptop-hibrida.conf
 source = ~/.config/hypr/gpu/sobremesa-nvidia.conf

source = ~/.config/hypr/gaming.conf
source = ~/.config/hypr/userprefs.conf
# Preferencias generadas desde AGS. Debe ir después de userprefs.conf.
source = ~/.config/hypr/input-settings.conf
# Variables genéricas para Firefox/Wayland (sin forzar un driver de GPU).
source = ~/.config/hypr/envs/firefox.conf

# Restaura la corrección global de color elegida en Ajustes > Accesibilidad.
# `exec` (no `exec-once`) vuelve a aplicarla también tras `hyprctl reload`.
exec = ~/.config/hypr/scripts/aplicar-filtro-daltonismo.sh
