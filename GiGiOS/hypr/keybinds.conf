#---VENTANANS---
bind = $mainMod SHIFT, F, fullscreen,
#compactar workspaces (elimina huecos, te sigue al nuevo ID)
bind = $mainMod SHIFT, N, exec, ~/.config/hypr/scripts/compact-workspaces.sh



#----APLICACIONES



#---HERRAMIENTAS

#capturas de pantalla
bind = CTRL, F, exec, mkdir -p $ruta_captura_pantalla && hyprshot -m output -m active -o $ruta_captura_pantalla
bind = CTRL, S, exec, mkdir -p $ruta_captura_pantalla && hyprshot -m region -o $ruta_captura_pantalla

#portapapeles
bind = $mainMod, V, exec, ~/.config/hypr/scripts/clipboard-history.sh picker
#panel de notificaciones (toggle)
bind = $mainMod, N, exec, ags request toggle-notifications
#menu desplegable apps (con traer-instancia-única al workspace actual)
bind = $mainMod, SPACE, exec, ~/.config/hypr/scripts/rofi-launch.py
#maximizar ventana
bind = $mainMod SHIFT, W, fullscreen, 1
#pegar ventanas
bind = $mainMod SHIFT, E, exec, ~/.config/hypr/scripts/toggle-gaps-borders.sh

# O con región (requiere slurp)
bind = $mainMod SHIFT, P, exec, wf-recorder -g "$(slurp)" -f $ruta_grabacion_pantalla/$(date +%Y%m%d_%H%M%S).mp4
# Monitor activo con audio del sistema (toggle: iniciar/detener)
bind = CTRL SHIFT, F, exec, ~/.config/hypr/scripts/grabar-pantalla.sh
# Ventana seleccionada con audio del sistema (toggle: iniciar/detener)
bind = CTRL SHIFT, S, exec, ~/.config/hypr/scripts/grabar-pantalla.sh ventana

#otros
bind = $mainMod, Q, exec, $terminal
bind = $mainMod SHIFT, C, killactive,
bind = $mainMod, M, exec, ags request toggle-quicksettings
bind = $mainMod, E, exec, $fileManager
bind = $mainMod SHIFT, Q, togglefloating,

#mover ventanas con teclado
bind = $mainMod SHIFT, left , movewindow, l
bind = $mainMod SHIFT, right , movewindow, r
bind = $mainMod SHIFT, up , movewindow, u
bind = $mainMod SHIFT, down , movewindow, d

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic


# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+; ags request volume-osd
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-; ags request volume-osd
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle; ags request volume-osd
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle; ags request mic-osd
# El brillo lo aplica AGS (widget/display/brightness.ts), no brightnessctl desde aquí: el
# hardware depende de la máquina — panel interno (sysfs) en el portátil, DDC/CI sobre el
# cable de vídeo en el sobremesa — y solo el shell sabe cuál hay. Llamar a `brightnessctl`
# a pelo era además activamente dañino en un sobremesa: sin dispositivos de clase
# `backlight` no falla, cae al primer dispositivo `leds` y enciende el LED de scroll-lock.
bindel = ,XF86MonBrightnessUp, exec, ags request brightness-up
bindel = ,XF86MonBrightnessDown, exec, ags request brightness-down
bind = , XF86Calculator, exec, qalculate-gtk



# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous


# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

#panel de ajustes (toggle)
bind = $mainMod, J, exec, ags request toggle-settings
bind = $mainMod SHIFT, J, layoutmsg, togglesplit # dwindle

# Orion panel
bind = $mainMod ALT, Space, exec, ~/.config/hypr/scripts/toggle-orion.sh

# Toggle de la barra ($mainMod+B: muestra/oculta; se auto-oculta al pasar el mouse)
bind = $mainMod, B, exec, ags request toggle-bar
