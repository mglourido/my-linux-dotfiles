general {
    gaps_in = 2.5
    gaps_out = 8

    border_size = 0

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    col.active_border =  rgba(ccccccee) rgba(888888ee) 45deg
    col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding       = 6
    rounding_power = 4
    active_opacity   = 1.0
    inactive_opacity = 0.92

    shadow {
        enabled      = true
        range        = 10
        render_power = 4
        offset       = 0, 2
        color        = rgba(00000088)
    }

    blur {
        enabled = true
        size    = 3
        passes  = 1
    }
}



# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    preserve_split = true # You probably want this
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true# If true disables the random hyprland logo / anime girl background. :(
# Añadir estas:
    focus_on_activate = false        # no roba el foco al abrirse apps
    mouse_move_enables_dpms = false  # no despierta pantalla al mover ratón
    key_press_enables_dpms = true    # sí la despierta al pulsar tecla
    disable_autoreload = false       # recarga conf automáticamente al guardar

    # Una ventana maximizada NO pierde el maximizado porque se abra otra en su
    # workspace: la nueva se coloca detrás, ya tileada al hueco que le toca.
    # 0 = ignore (esto), 1 = take_over (la nueva hereda el maximizado y la vieja
    # lo pierde), 2 = exit_fullscreen (el DEFAULT de Hyprland: la maximizada sale
    # del estado y las dos se reparten el workspace).
    # OJO: la opción que citan las guías, misc:new_window_takes_over_fullscreen,
    # NO existe desde 0.5x — la sustituye esta, y ponerla no da ningún error.
    # Peaje aceptado: la ventana nueva nace tapada y sin foco, así que abrir una
    # app sobre una maximizada parece "que no ha hecho nada" hasta que sales del
    # maximizado (SUPER+SHIFT+W) o cambias de foco.
    on_focus_under_fullscreen = 0
}
