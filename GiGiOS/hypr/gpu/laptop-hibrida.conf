# ============================================================
#  GPU — LAPTOP HÍBRIDA  (Intel Arc Arrow Lake + NVIDIA RTX 5060)
#  Ruta: ~/.config/hypr/gpu/laptop-hibrida.conf
#
#  Modelo: el COMPOSITOR y la PANTALLA corren en Intel (el eDP cuelga
#  de i915). La NVIDIA queda SOLO para offload de juegos/render pesado.
#
#  Para lanzar un juego en la NVIDIA:
#      prime-run <juego>
#      gamemoderun prime-run %command%      (opción de lanzamiento en Steam)
#      gamescope -f -- prime-run %command%
#  prime-run ya inyecta __NV_PRIME_RENDER_OFFLOAD, __GLX_VENDOR_LIBRARY_NAME
#  y __VK_LAYER_NV_optimus por proceso, así que NO hacen falta globales.
# ============================================================

# Fija Intel como GPU primaria (scanout/compositor). NVIDIA queda para offload.
# Por qué un alias y no cardN/by-path:
#   - AQ_DRM_DEVICES separa dispositivos con ':', así que NO sirven las rutas
#     by-path (tienen ':' en la dirección PCI → aquamarine las parte mal →
#     Hyprland no arranca).
#   - Los /dev/dri/cardN se intercambian entre reinicios (un arranque
#     card1=Intel, otro card1=NVIDIA), así que fijarlos tampoco es fiable.
# Solución: una regla udev da un nombre estable y sin ':' a la Intel
# (PCI 0000:00:02.0) → /dev/dri/gigios-igpu.  Instalar una vez:
#   sudo cp ~/GiGiOS/hypr/gpu/99-gigios-igpu.rules /etc/udev/rules.d/
#   sudo udevadm control --reload && sudo udevadm trigger
# Se lista SOLO la Intel: el compositor no abre la NVIDIA (puede dormir para
# ahorrar batería) y sigue disponible para prime-run.
env = AQ_DRM_DEVICES,/dev/dri/gigios-igpu

# IMPORTANTE: aquí NO se ponen GBM_BACKEND=nvidia-drm ni
# __GLX_VENDOR_LIBRARY_NAME=nvidia ni LIBVA_DRIVER_NAME=nvidia globales.
# El escritorio va en Intel; forzar NVIDIA global mete reverse-PRIME,
# gasta batería y rompe la aceleración de vídeo (VA-API) de Intel.

# Con el compositor en Intel los cursores por hardware funcionan bien.
cursor:no_hardware_cursors = false
