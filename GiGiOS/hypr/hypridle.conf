#aqui se gestio los modos de ahorro de pantalla-> suspensión , bajar brillo ...
#─────────────────────────────────────────────
# ESTE FICHERO SIGUE EN HYPRLANG A PROPÓSITO: hypridle es un binario aparte y NO
# tiene intérprete Lua (0.1.7 enlaza solo libhyprlang, verificado con ldd). La
# migración a Lua es del compositor, no de la familia hypr* entera.
#
# Los on-timeout NO llaman a la acción directamente: pasan por
# scripts/idle-action.sh, que la ejecuta salvo que la función "Wake up" del menú
# de la barra la esté vetando (hypridle no sabe de Wake up). Sin estado, el script
# ejecuta la acción de siempre, así que esto se comporta igual que antes.
# Los tiempos los edita Ajustes > Pantalla (ags/servicios/pantalla/hypridle.ts), que
# reconoce los listeners por su on-timeout: si cambias estas líneas, mira su kindOf().
#
# OJO al escribir comandos aquí: nada de `{ }` dentro de un listener. El parser de
# AGS trocea por `listener\s*\{[^}]*\}`, así que una llave de tabla Lua cerraría el
# bloque antes de tiempo y el listener dejaría de ser editable desde Ajustes EN
# SILENCIO. Por eso la forma de cadena `hl.dsp.dpms('on')` y no `{ action = "on" }`.
#─────────────────────────────────────────────
general {
    # hyprlock NO tiene guarda de instancia única (0.9.6: ni una cadena "already
    # running" en el binario), así que lanzarlo dos veces arranca dos procesos de
    # verdad. Con el listener de bloqueo encendido eso pasa solo: bloquea a los 11
    # min y a los 20 el suspend lanzaría un SEGUNDO hyprlock encima. El `pidof` es
    # la guarda que recomienda el propio ejemplo de /usr/share/hypr/hypridle.conf.
    lock_cmd = pidof hyprlock || hyprlock
    # Va por logind y NO llama a hyprlock directo: así el bloqueo antes de suspender
    # entra por lock_cmd — un solo camino, y con la guarda de arriba ya aplicada.
    before_sleep_cmd = loginctl lock-session
    # Forma Lua de Hyprland 0.56 primero, legacy como repliegue — mismo patrón que
    # dpms_off() en idle-action.sh, y por el mismo motivo: bajo config Lua el
    # `hyprctl dispatch dpms on` de siempre se reinterpreta como código Lua y falla
    # (`')' expected near 'on'`, rc=7). Se mira el stdout y no el código de salida
    # porque bajo config legacy hyprctl responde "Invalid dispatcher" con rc=0.
    after_sleep_cmd = hyprctl dispatch "hl.dsp.dpms('on')" | grep -q "^ok" || hyprctl dispatch dpms on

    # inhibit_sleep se deja SIN PONER (defecto = 2, "auto") a propósito. El 3
    # ("lock notify") retiene el inhibidor de suspensión hasta que la sesión
    # Wayland está realmente bloqueada — la garantía más fuerte de que el PC no se
    # duerme antes de que hyprlock pinte —, pero si hyprlock no llegara a arrancar
    # ese bloqueo NO expira: el PC no se suspendería jamás, en silencio y sin UI
    # donde apagarlo. Es exactamente el modo de fallo que la puerta del Wake up
    # evita a propósito (ver la REGLA DE ORO de idle-action.sh), así que no se
    # cambia el defecto por una carrera de milisegundos. Valores medidos en 0.1.7:
    # 0=disable, 1=normal, 2=auto, 3=lock notify (4 → "Invalid inhibit_sleep value").
}

#apagar pantalla / el OS ya libera ram si puede auto
listener {
    timeout = 600          # 10 min — apagar pantalla
    on-timeout = ~/.config/hypr/scripts/idle-action.sh dpms-off
    # on-resume va directo a propósito (NO por idle-action.sh): encender la pantalla
    # al volver nunca se veta, y es lo único que la despierta si vuelves con el ratón
    # (mouse_move_enables_dpms = false en gigios/ventanas.lua; solo una tecla la
    # enciende por su cuenta). Doble forma por lo mismo que after_sleep_cmd, arriba.
    on-resume = hyprctl dispatch "hl.dsp.dpms('on')" | grep -q "^ok" || hyprctl dispatch dpms on
}

#mandar al lock
listener {
    # timeout = 660   # GIGIOS-OFF        # 11 min — bloquear
    on-timeout = ~/.config/hypr/scripts/idle-action.sh lock
}

#suspender pc
listener {
    timeout = 1200         # 20 min — suspender
    on-timeout = ~/.config/hypr/scripts/idle-action.sh suspend
}