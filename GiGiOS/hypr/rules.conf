#aqui van reglas de ventanas


# Tearing en juegos (requiere general:allow_tearing = true, en gaming.conf).
# Ajusta el match a tus juegos; steam_app_* cubre casi todo lo de Steam.
windowrule {
    name = tearing-games
    match:class = ^(steam_app_.*|gamescope|.*\.exe)$
    immediate = true
}


# Firefox & Kitty opacity
windowrule {
    name = firefox-opacity
    match:class = firefox
    opacity = 1.0 override 1.0 override
}

windowrule {
    name = kitty-opacity
    match:class = kitty
    opacity = 1.0 override 1.0 override
}

# Calculadora
windowrule {
    name = qalculate
    match:class = qalculate-gtk
    float = true
}

# Selector de archivos del portal (Abrir/Guardar de navegadores y apps GTK).
# Nace tiled y por tanto reordena el tiling del workspace entero para un diálogo
# que cierras en dos segundos. Clase verificada en el socket de eventos:
# `openwindow>>…,xdg-desktop-portal-gtk,…`.
windowrule {
    name = portal-file-chooser
    match:class = xdg-desktop-portal-gtk
    float = true
    size = 60% 60%
    center = true
}

# --- Utilidades de sistema: ventanas de usar y tirar ---
# Abres el control de volumen, tocas un slider y cierras. Naciendo tiled te
# reordenan el workspace entero para eso. Clases verificadas lanzando cada app y
# leyendo `initialClass` de hyprctl clients, no supuestas: varias NO coinciden
# con el nombre del binario (pavucontrol -> org.pulseaudio.pavucontrol,
# gnome-disks -> org.gnome.DiskUtility), y adivinarlas deja reglas que no disparan.

windowrule {
    name = pavucontrol
    match:class = org.pulseaudio.pavucontrol
    float = true
    center = true
}

windowrule {
    name = blueman
    match:class = blueman-manager
    float = true
    center = true
}

windowrule {
    name = nm-connection-editor
    match:class = nm-connection-editor
    float = true
    center = true
}

windowrule {
    name = gnome-disks
    match:class = org.gnome.DiskUtility
    float = true
    center = true
}

# Picture-in-Picture de Firefox: flotante y SIEMPRE encima, que es su razón de ser
# (la ves mientras haces otra cosa). `pin` la mantiene además al cambiar de
# workspace. Ojo: título sin verificar aquí — si Firefox lo traduce en tu idioma,
# esta regla no dispara y hay que ajustar el match.
windowrule {
    name = firefox-pip
    match:class = firefox
    match:title = Picture-in-Picture
    float = true
    pin = true
}

# Waybar and Wifi Panel
windowrule {
    name = wifi-panel
    match:class = wifi-panel
    float = true
    move = 1540 44
    size = 340 600
    pin = true
}

layerrule {
    name = waybar-layer
    match:namespace = waybar
    blur = true
}

layerrule {
    name = orion-acrilico
    match:namespace = orion
    blur = true
    ignore_alpha = 0.1
}

layerrule {
    name = quick-settings-acrilico
    match:namespace = quick-settings
    blur = true
    ignore_alpha = 0.1
}

layerrule {
    name = notificaciones-acrilico
    match:namespace = notification-panel
    blur = true
    ignore_alpha = 0.1
}

layerrule {
    name = calendario-acrilico
    match:namespace = calendar-panel
    blur = true
    ignore_alpha = 0.1
}

# La pila de popups es UNA sola superficie que crece al apilar avisos, y Hyprland
# anima ese cambio de tamano: mientras dura, el buffer nuevo (mas alto) se escala
# dentro de la caja que aun esta creciendo, asi que los popups que YA estaban en
# pantalla se encogen y vuelven — se ve como un pestaneo en el que desaparecen y se
# vuelven a dibujar. Medido con grim: con la animacion activa el rectangulo del
# popup de arriba cambia durante ~150 ms al llegar el siguiente; sin ella es
# constante bit a bit. No se anima nada que el usuario quiera ver: la entrada y la
# salida de cada aviso las hace GTK con sus keyframes (notif-slide-in /
# notif-slide-out en estilos/style.scss), no el compositor.
layerrule {
    name = notificaciones-popup-sin-anim
    match:namespace = notification-popups
    animation = none
}

layerrule {
    name = osd-acrilico
    match:namespace = osd
    blur = true
    ignore_alpha = 0.1
}



