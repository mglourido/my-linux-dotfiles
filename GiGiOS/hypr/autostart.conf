#aquí van todos los programas que queremos que se abran apenas se inicia hyprland
#─────────────────────────────────────────────
#
# ── Calendario de arranque (por qué hay `sleep N &&`) ────────────────────────
# Todos estos `exec-once` salían A LA VEZ, compitiendo con la carga del propio
# Hyprland y del shell (AGS) justo cuando la caché está fría: journal sin cachear,
# firmas de ClamAV sin cargar, discos aún despertando. Lo caro no es ninguno de
# ellos por separado, es que ~12 procesos pidan datos del sistema a la vez que se
# pinta el escritorio.
#
# La regla es: lo que el usuario VE o lo que no puede perder eventos va a t=0; lo
# que solo consulta el estado del PC (disco, sensores, batería, journal) se aparta
# unos segundos. Nada de esto es urgente al segundo 0 — un disco lleno o un
# ventilador parado siguen estándolo 20 s después — así que el usuario no lo nota.
#
# Van ESCALONADOS, no todos con el mismo `sleep`: darles a todos `sleep 5` solo
# movería la misma avalancha 5 s más tarde. Cada uno tiene su hueco.
#
# El retardo vive AQUÍ y no dentro de los scripts a propósito: `screencast-monitor`
# y `updates-monitor` también los lanza AGS en caliente desde sus interruptores de
# Ajustes (setter maestro: pkill + re-exec). Un `sleep` dentro del script haría que
# encender el interruptor tardara 15 s en hacer nada — el interruptor parecería roto.
# El retardo es una propiedad del ARRANQUE, no del script.
#
# Excepción: `oom-monitor.sh` se escalona por dentro. No es una unidad — son 6
# sub-monitores con riesgos distintos: los que siguen el journal en busca de eventos
# de seguridad NO pueden retrasarse (usan `-n 0`, así que lo que pase en la ventana
# de retardo se pierde para siempre), pero el escaneo de descargas y el sondeo SMART
# sí. Ver su cabecera.

#---NECESITAN SUDO----


#---NO SUDO----

# ── t=0 · lo que se ve, o lo que no puede perder eventos ─────────────────────

# Tema oscuro e iconos coherentes para aplicaciones GTK y KDE.
exec-once = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'
exec-once = gsettings set org.gnome.desktop.interface icon-theme 'Tela-circle-grey'

exec-once = hypridle
exec-once = ~/.config/inicializador/init.sh
exec-once = /usr/lib/hyprpolkitagent/hyprpolkitagent
exec-once = pkill -f "ags\.js$" 2>/dev/null; sleep 0.3; ags run ~/.config/ags/
exec-once = awww-daemon
exec-once = ~/.config/hypr/scripts/wallpaper.sh
# La limpieza es condicional y termina antes de arrancar el watcher, evitando
# que este vuelva a guardar el contenido heredado de la sesión anterior.
exec-once = ~/.config/hypr/scripts/limpiar-portapapeles.sh al-iniciar; ~/.config/hypr/scripts/clipboard-history.sh start
# Monitor de eventos de seguridad. Sin retardo: sus seguidores del journal
# (`journalctl -kf -n 0`) no ven el backlog, así que arrancar tarde = ventana ciega
# en OOM/panic/sudo/SSH. Sus partes caras (SMART, unidades, descargas) se apartan
# solas dentro del script.
exec-once = ~/.config/hypr/scripts/oom-monitor.sh

# ── t=3..6 · monitores dirigidos por eventos ─────────────────────────────────
# Bloquean en un socket (udev/D-Bus/nmcli/PipeWire): en reposo no cuestan nada, pero
# su arranque compite con el de los propios servicios a los que se enganchan. Los
# dispositivos ya presentes al encender NO generan eventos después del login (los
# emitió el kernel durante el boot, antes de que estos existieran), así que el
# retardo solo se saltaría algo que enchufes en esos primeros segundos.
exec-once = sleep 3 && ~/.config/hypr/scripts/bt-monitor.sh
exec-once = sleep 4 && ~/.config/hypr/scripts/usb-monitor.sh
# WiFi: además, arrancar tarde estrecha una carrera real — el script busca la interfaz
# con `nmcli` nada más nacer, y NetworkManager arranca a la vez que estos exec-once.
# El script ya no depende solo de este margen: si no hay interfaz distingue "no hay
# antena" (salida silenciosa) de "hay antena y NM aún no la publica" (reintenta 30 s
# antes de avisar). Ver su cabecera.
# OJO al depurar: en un equipo SIN wifi (este sobremesa: solo enp4s0 + tailscale0)
# no aparece en `ps` y ES lo correcto — no significa que el retardo falle. Lo mismo
# con battery/temp-monitor, que salen solos si su toggle está en `false` en
# preferences.json (aquí ambos lo están).
exec-once = sleep 5 && ~/.config/hypr/scripts/wifi-monitor.sh
# Screencast: necesita que PipeWire haya publicado sus nodos para que `pw-dump` vea algo.
exec-once = sleep 6 && ~/.config/hypr/scripts/screencast-monitor.sh

# ── t=8..15 · sondeos de estado del PC ───────────────────────────────────────
# Ninguno es urgente al arrancar: la RAM está libre, la CPU fría y el disco tan lleno
# como hace un minuto. Se apartan del pico de carga.
exec-once = sleep 8 && ~/.config/hypr/scripts/ram-monitor.sh
exec-once = sleep 10 && ~/.config/hypr/scripts/temp-monitor.sh
exec-once = sleep 12 && ~/.config/hypr/scripts/battery-monitor.sh
# Disco: comprobación única (`df`) y sale. Quedarse sin espacio es cosa de una vez al
# año — puede esperar 15 s.
exec-once = sleep 15 && ~/.config/hypr/scripts/disk-monitor.sh

# ── t=20..30 · lo caro ───────────────────────────────────────────────────────
# Monitor de actualizaciones (SO + drivers GPU). Toca RED y sincroniza una BD temporal
# de pacman: lo último que quieres compitiendo con el arranque de la sesión.
exec-once = sleep 20 && ~/.config/hypr/scripts/updates-monitor.sh
# Healthcheck de arranque: es el más caro de todos (lee el journal entero del boot dos
# veces, SMART de cada disco, sensores, ping). Es un DIAGNÓSTICO, no una alarma en
# vivo — nadie lo necesita en el primer medio minuto. Antes esperaba 5 s por dentro
# ("Let the session fully initialize"); ese sleep se movió aquí para que el calendario
# de arranque se lea entero en un sitio y para poder ejecutarlo a mano sin esperas.
# Además le da tiempo a systemd a terminar el boot: `systemd-analyze` falla si aún no
# ha acabado, y con él se perdía el aviso de arranque lento.
exec-once = sleep 30 && ~/.config/hypr/scripts/boot-healthcheck.sh

# (KWallet retirado) Las credenciales de Spotify viven ahora en texto plano en
# ~/.config/gigios/spotify-creds.json — no se arranca ningún ksecretd/KWallet.
