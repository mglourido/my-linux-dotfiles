#aquí van todos los programas que queremos que se abran apenas se inicia hyprland
#─────────────────────────────────────────────

#---NECESITAN SUDO----


#---NO SUDO----

# Tema oscuro por defecto del sistema (lo leen las apps vía xdg-desktop-portal)
exec-once = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'

exec-once = hypridle
exec-once = ~/.config/inicializador/init.sh
exec-once = /usr/lib/hyprpolkitagent/hyprpolkitagent
exec-once = pkill -f "ags\.js$" 2>/dev/null; sleep 0.3; ags run ~/.config/ags/
exec-once = ~/.config/hypr/scripts/boot-healthcheck.sh
exec-once = awww-daemon
exec-once = ~/.config/hypr/scripts/wallpaper.sh
exec-once = wl-paste --watch cliphist store
exec-once = ~/.config/hypr/scripts/battery-monitor.sh
exec-once = ~/.config/hypr/scripts/temp-monitor.sh
exec-once = ~/.config/hypr/scripts/ram-monitor.sh
exec-once = ~/.config/hypr/scripts/disk-monitor.sh
exec-once = ~/.config/hypr/scripts/oom-monitor.sh
exec-once = ~/.config/hypr/scripts/wifi-monitor.sh
exec-once = ~/.config/hypr/scripts/usb-monitor.sh
exec-once = ~/.config/hypr/scripts/bt-monitor.sh
# (KWallet retirado) Las credenciales de Spotify viven ahora en texto plano en
# ~/.config/gigios/spotify-creds.json — no se arranca ningún ksecretd/KWallet.
