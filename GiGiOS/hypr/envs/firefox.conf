# ============================================================
#  Hyprland — variables de entorno para Firefox + NVIDIA
#  Ruta: ~/.config/hypr/envs/firefox.conf
#
#  Incluir desde hyprland.conf con:
#    source = ~/.config/hypr/envs/firefox.conf
# ============================================================


# Forzar modo Wayland nativo en Firefox (desde v121 es el default,
# pero conviene fijarlo explícitamente)
env = MOZ_ENABLE_WAYLAND,1

# Necesario para que VA-API (aceleración de vídeo) funcione
# con NVIDIA en Wayland — desactiva el sandbox RDD
env = MOZ_DISABLE_RDD_SANDBOX,1

# Usar EGL sobre Wayland (mejora rendimiento de renderizado con NVIDIA)
env = EGL_PLATFORM,wayland

# Driver VA-API de NVIDIA
env = LIBVA_DRIVER_NAME,nvidia
