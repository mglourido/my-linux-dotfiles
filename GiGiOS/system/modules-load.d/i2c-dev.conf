# GiGiOS — brillo por DDC/CI en monitores externos (sobremesa).
#
# El brillo de un monitor externo NO se toca por /sys/class/backlight (esa clase la publica
# solo el panel interno de un portátil): vive en el firmware del monitor y se habla con él
# por I2C sobre el propio cable de vídeo (DDC/CI). `ddcutil` necesita para eso los nodos
# /dev/i2c-*, que solo existen con el módulo `i2c-dev` cargado — y no lo carga nadie solo.
#
# Sin esto, tras un reinicio el shell no encuentra backend y el slider de brillo desaparece.
# El acceso a los nodos ya lo resuelve la regla udev del propio ddcutil
# (/usr/lib/udev/rules.d/60-ddcutil-i2c.rules, `TAG+="uaccess"`): no hace falta grupo `i2c`.
#
# Lo copia install.sh (paso 6), que además hace el modprobe para no obligar a reiniciar.
# En una máquina ya montada, a mano (como la regla udev de USB — /etc no se symlinkea):
#   sudo install -Dm644 system/modules-load.d/i2c-dev.conf /etc/modules-load.d/i2c-dev.conf
#   sudo modprobe i2c-dev
i2c-dev
