# GiGiOS · perfil TLP "ahorro" (batería al máximo)
# ---------------------------------------------------------------------------
# SUSTITUYE ENTERO a /etc/tlp.conf cuando eliges "Ahorro" en Ajustes > Energía.
# Sacrifica rendimiento en batería por autonomía. Afínalo a tu portátil; los
# valores ON_AC se dejan como en normal.conf para no penalizarte enchufado.
# `man tlp.conf` para el detalle de cada clave.
# ---------------------------------------------------------------------------

TLP_ENABLE=1
TLP_WARN_LEVEL=3
TLP_DEFAULT_MODE=BAT
TLP_PERSISTENT_DEFAULT=0

# --- CPU (agresivo en batería) ---------------------------------------------
CPU_ENERGY_PERF_POLICY_ON_AC=balance_performance
CPU_ENERGY_PERF_POLICY_ON_BAT=power
CPU_BOOST_ON_AC=1
CPU_BOOST_ON_BAT=0            # sin turbo en batería
CPU_HWP_DYN_BOOST_ON_AC=1
CPU_HWP_DYN_BOOST_ON_BAT=0
CPU_MAX_PERF_ON_BAT=60       # techo de frecuencia al 60 % en batería
PLATFORM_PROFILE_ON_AC=balanced
PLATFORM_PROFILE_ON_BAT=low-power

# --- Discos (más ahorro, más latencia de spin-up) --------------------------
DISK_APM_LEVEL_ON_AC="254 254"
DISK_APM_LEVEL_ON_BAT="1 1"
SATA_LINKPWR_ON_AC="med_power_with_dipm"
SATA_LINKPWR_ON_BAT="min_power"

# --- PCIe / runtime PM -----------------------------------------------------
RUNTIME_PM_ON_AC=auto
RUNTIME_PM_ON_BAT=auto
PCIE_ASPM_ON_AC=default
PCIE_ASPM_ON_BAT=powersupersave

# --- USB (autosuspende todo lo que se pueda) -------------------------------
USB_AUTOSUSPEND=1

# --- Wifi / radios ---------------------------------------------------------
WIFI_PWR_ON_AC=off
WIFI_PWR_ON_BAT=on

# --- Batería (umbrales; requieren soporte del equipo) ----------------------
#START_CHARGE_THRESH_BAT0=75
#STOP_CHARGE_THRESH_BAT0=80
