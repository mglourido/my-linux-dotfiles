# GiGiOS · perfil TLP "normal" (equilibrado)
# ---------------------------------------------------------------------------
# Este fichero SUSTITUYE ENTERO a /etc/tlp.conf cuando eliges "Normal" en
# Ajustes > Energía. Es tu perfil de referencia: si ya tenías un tlp.conf
# afinado, pega aquí SU contenido y deja que ahorro.conf sea la versión
# agresiva. Los valores de abajo son un punto de partida razonable, no dogma.
#
# Formato TLP: CLAVE=valor; los sufijos _ON_AC / _ON_BAT distinguen enchufado
# vs batería. GiGiOS añade una tercera dimensión (Normal vs Ahorro) cambiando
# el fichero entero. Documentación: `man tlp.conf`.
# ---------------------------------------------------------------------------

TLP_ENABLE=1
TLP_WARN_LEVEL=3
TLP_DEFAULT_MODE=AC
TLP_PERSISTENT_DEFAULT=0

# --- CPU -------------------------------------------------------------------
# Gobernador P-state / escalado. En batería, "power" prioriza consumo.
CPU_ENERGY_PERF_POLICY_ON_AC=balance_performance
CPU_ENERGY_PERF_POLICY_ON_BAT=balance_power
CPU_BOOST_ON_AC=1
CPU_BOOST_ON_BAT=1
CPU_HWP_DYN_BOOST_ON_AC=1
CPU_HWP_DYN_BOOST_ON_BAT=1
PLATFORM_PROFILE_ON_AC=balanced
PLATFORM_PROFILE_ON_BAT=balanced

# --- Discos ----------------------------------------------------------------
DISK_APM_LEVEL_ON_AC="254 254"
DISK_APM_LEVEL_ON_BAT="128 128"
SATA_LINKPWR_ON_AC="med_power_with_dipm"
SATA_LINKPWR_ON_BAT="med_power_with_dipm"

# --- PCIe / runtime PM -----------------------------------------------------
RUNTIME_PM_ON_AC=auto
RUNTIME_PM_ON_BAT=auto
PCIE_ASPM_ON_AC=default
PCIE_ASPM_ON_BAT=powersave

# --- USB -------------------------------------------------------------------
USB_AUTOSUSPEND=1

# --- Wifi / radios ---------------------------------------------------------
WIFI_PWR_ON_AC=off
WIFI_PWR_ON_BAT=on

# --- Batería (umbrales; requieren soporte del equipo) ----------------------
# Descoméntalos y ajústalos a tu portátil si soporta umbrales de carga.
#START_CHARGE_THRESH_BAT0=75
#STOP_CHARGE_THRESH_BAT0=80
