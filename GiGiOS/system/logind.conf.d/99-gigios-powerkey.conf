# Cede el botón de encendido a Hyprland.
#
# systemd-logind maneja la tecla de encendido a nivel de ASIENTO, leyendo el
# evento de entrada por su cuenta y sin pasar por el compositor. De fábrica
# HandlePowerKey=poweroff, así que el bind de Hyprland (`bindl = , XF86PowerOff`)
# y logind se disparan a la vez y gana el apagado de logind: la acción elegida en
# Ajustes > Energía no se llegaría a notar nunca — un fallo mudo, porque el bind
# SÍ se ejecuta.
#
# Con `ignore` el único dueño de la tecla pasa a ser Hyprland, y la acción la
# decide GiGiOS.boton_apagado() (hypr/gigios/boton-apagado.lua) leyendo la
# preferencia del usuario. El
# valor de fábrica de esa preferencia es "apagar", así que el comportamiento por
# defecto no cambia.
#
# La pulsación LARGA se deja como esté (por defecto `ignore`): es la salida de
# emergencia del firmware y no debe depender de que el shell responda.
#
# Este fichero NO se symlinkea: systemd lee /etc antes de que $HOME esté montado,
# y apuntar /etc a un directorio escribible por el usuario sería una escalada
# silenciosa. Lo copia install.sh (paso 9). A mano:
#   sudo install -Dm644 system/logind.conf.d/99-gigios-powerkey.conf \
#        /etc/systemd/logind.conf.d/99-gigios-powerkey.conf
#   sudo systemctl reload systemd-logind
[Login]
HandlePowerKey=ignore
